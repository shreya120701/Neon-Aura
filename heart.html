<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Aura AR</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #050510; overflow: hidden; font-family: 'Inter', sans-serif; color: white; }

        .input_video {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover; transform: scaleX(-1);
            filter: brightness(0.5);
            z-index: 0;
        }

        #mainCanvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            transform: scaleX(-1);
            z-index: 5; pointer-events: none;
        }

        /* 3D Heart overlay */
        #heartScene {
            position: absolute; inset: 0;
            z-index: 20;
            display: flex; align-items: center; justify-content: center;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        #heartScene.visible { opacity: 1; }

        .heart-wrap {
            position: relative;
            animation: floatHeart 3s ease-in-out infinite;
        }

        @keyframes floatHeart {
            0%, 100% { transform: translateY(0px) rotateY(0deg); }
            50% { transform: translateY(-30px) rotateY(180deg); }
        }

        .heart-svg {
            width: 380px; height: 380px;
            filter: drop-shadow(0 0 40px #ff003c) drop-shadow(0 0 80px #ff003c) drop-shadow(0 0 120px #ff0066);
            animation: heartbeat 0.8s ease-in-out infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            15% { transform: scale(1.15); }
            30% { transform: scale(1); }
            45% { transform: scale(1.08); }
        }

        .heart-glow-ring {
            position: absolute; inset: -40px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,0,60,0.3) 0%, transparent 70%);
            animation: pulseRing 0.8s ease-in-out infinite;
        }

        @keyframes pulseRing {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.3); opacity: 0.3; }
        }

        /* HUD */
        #hud {
            position: absolute; top: 20px; left: 20px;
            z-index: 30; pointer-events: none;
        }
        .panel {
            background: rgba(20,25,40,0.5);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            padding: 12px 18px;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.8);
            margin-bottom: 10px;
        }
        .panel span { font-weight: bold; color: #ff003c; }



        #gestureLabel {
            position: absolute; bottom: 40px; left: 50%;
            transform: translateX(-50%);
            z-index: 30; font-size: 1.4rem; font-weight: bold;
            letter-spacing: 3px; color: #ff003c;
            text-shadow: 0 0 20px #ff003c;
            opacity: 0; transition: opacity 0.3s;
        }
        #gestureLabel.show { opacity: 1; }
    </style>
</head>
<body>



<video class="input_video" autoplay playsinline></video>
<canvas id="mainCanvas"></canvas>

<div id="heartScene">
    <div class="heart-wrap">
        <div class="heart-glow-ring"></div>
        <svg class="heart-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <radialGradient id="heartGrad" cx="50%" cy="40%" r="60%">
                    <stop offset="0%" stop-color="#ff6688"/>
                    <stop offset="50%" stop-color="#ff003c"/>
                    <stop offset="100%" stop-color="#990022"/>
                </radialGradient>
                <filter id="glow">
                    <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
                    <feMerge>
                        <feMergeNode in="coloredBlur"/>
                        <feMergeNode in="SourceGraphic"/>
                    </feMerge>
                </filter>
            </defs>
            <path filter="url(#glow)" fill="url(#heartGrad)"
                d="M50 85
                   C50 85 15 60 15 35
                   C15 20 25 12 35 12
                   C42 12 48 16 50 20
                   C52 16 58 12 65 12
                   C75 12 85 20 85 35
                   C85 60 50 85 50 85Z"/>
            <!-- Highlight for 3D effect -->
            <ellipse cx="38" cy="28" rx="8" ry="5"
                fill="rgba(255,255,255,0.25)" transform="rotate(-20,38,28)"/>
        </svg>
    </div>
</div>

<div id="hud">
    <div class="panel">Hands: <span id="ui-hands">0</span></div>
    <div class="panel">Gesture: <span id="ui-gesture">None</span></div>
</div>

<div id="gestureLabel">❤️ HEART DETECTED</div>

<script>
const videoElement = document.querySelector('.input_video');
const mainCanvas   = document.getElementById('mainCanvas');
const ctx          = mainCanvas.getContext('2d');
const heartScene   = document.getElementById('heartScene');
const gestureLabel = document.getElementById('gestureLabel');
const uiHands      = document.getElementById('ui-hands');
const uiGesture    = document.getElementById('ui-gesture');

let width = window.innerWidth, height = window.innerHeight;
let currentHands = [];
let time = 0, lastTime = performance.now();
let particles = [];
let heartArmed = [true, true];
let heartVisible = false;
let heartTimeout = null;
let audioCtx = null;

function resize() {
    width = window.innerWidth; height = window.innerHeight;
    mainCanvas.width = width; mainCanvas.height = height;
}
window.addEventListener('resize', resize);
resize();

// ── Audio ──────────────────────────────────────────────────────────────────
function initAudio() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playHeartSound() {
    if (!audioCtx) return;
    // Warm chord: root + major third + fifth
    [[261.6, 0], [329.6, 0.05], [392, 0.1]].forEach(([freq, delay]) => {
        const osc  = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0, audioCtx.currentTime + delay);
        gain.gain.linearRampToValueAtTime(0.15, audioCtx.currentTime + delay + 0.05);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + delay + 1.5);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(audioCtx.currentTime + delay);
        osc.stop(audioCtx.currentTime + delay + 1.5);
    });
}

// ── Heart detection ────────────────────────────────────────────────────────
function getDist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }

function mapToCanvas(p) { return { x: p.x * width, y: p.y * height }; }

function detectHeart(hand) {
    // Method 1: Thumb tip (4) and index tip (8) pinched close = mini heart
    const thumbIndexDist = getDist(hand[4], hand[8]);

    // Method 2: Index (8) and middle (12) tips spread apart while ring+pinky curled
    const indexMiddleDist = getDist(hand[8], hand[12]);
    const palmBase = hand[0];
    const handSize = getDist(palmBase, hand[5]);

    const indexUp  = getDist(hand[8],  palmBase) > getDist(hand[5],  palmBase);
    const middleUp = getDist(hand[12], palmBase) > getDist(hand[9],  palmBase);
    const ringDown = getDist(hand[16], palmBase) < getDist(hand[13], palmBase);
    const pinkyDown= getDist(hand[20], palmBase) < getDist(hand[17], palmBase);

    // Heart: index + middle up and spread, ring + pinky down
    const isVHeart = indexUp && middleUp && ringDown && pinkyDown
                     && indexMiddleDist > handSize * 0.8;

    // Pinch heart: thumb and index very close
    const isPinchHeart = thumbIndexDist < 0.04;

    return isVHeart || isPinchHeart;
}

function showHeart() {
    heartVisible = true;
    heartScene.classList.add('visible');
    gestureLabel.classList.add('show');
    playHeartSound();
    spawnHeartParticles();
    clearTimeout(heartTimeout);
    heartTimeout = setTimeout(hideHeart, 3000);
}

function hideHeart() {
    heartVisible = false;
    heartScene.classList.remove('visible');
    gestureLabel.classList.remove('show');
}

// ── Particles ──────────────────────────────────────────────────────────────
function spawnHeartParticles() {
    for (let i = 0; i < 40; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 2 + Math.random() * 5;
        particles.push({
            x: width / 2, y: height / 2,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - 3,
            life: 1.0,
            size: 4 + Math.random() * 6,
            color: `hsl(${340 + Math.random() * 30}, 100%, ${50 + Math.random() * 20}%)`
        });
    }
}

// ── Render ─────────────────────────────────────────────────────────────────
function renderLoop(timestamp) {
    requestAnimationFrame(renderLoop);
    const dt = (timestamp - lastTime) / 1000;
    lastTime = timestamp;
    time += dt;

    ctx.globalCompositeOperation = 'destination-out';
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.fillRect(0, 0, width, height);
    ctx.globalCompositeOperation = 'screen';

    // Particles
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy;
        p.vy += 0.1; p.life -= 0.018;
        if (p.life <= 0) { particles.splice(i, 1); continue; }
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.life;
        ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Hand skeleton
    if (currentHands.length > 0) {
        currentHands.forEach((hand, hi) => {
            const col = `hsl(${340 + hi * 30}, 100%, 60%)`;
            drawConnectors(ctx, hand, HAND_CONNECTIONS, { color: col, lineWidth: 2 });
            ctx.shadowBlur = 15; ctx.shadowColor = col;
            [4, 8, 12, 16, 20].forEach(ti => {
                const pt = mapToCanvas(hand[ti]);
                ctx.beginPath();
                ctx.arc(pt.x, pt.y, 5, 0, Math.PI * 2);
                ctx.fillStyle = '#fff';
                ctx.fill();
            });
            ctx.shadowBlur = 0;
        });
    }

    ctx.globalCompositeOperation = 'source-over';
}

// ── MediaPipe ──────────────────────────────────────────────────────────────
function initMediaPipe() {
    const hands = new Hands({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
    hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });

    hands.onResults(results => {
        uiHands.innerText = results.multiHandLandmarks ? results.multiHandLandmarks.length : 0;
        currentHands = results.multiHandLandmarks || [];

        let anyHeart = false;
        currentHands.forEach((hand, idx) => {
            const isHeart = detectHeart(hand);
            if (isHeart) {
                anyHeart = true;
                uiGesture.innerText = '❤️ Heart';
                if (heartArmed[idx]) {
                    heartArmed[idx] = false;
                    showHeart();
                }
            } else {
                heartArmed[idx] = true;
                if (!anyHeart) uiGesture.innerText = 'None';
            }
        });

        if (!currentHands.length) uiGesture.innerText = 'None';
    });

    const camera = new Camera(videoElement, {
        onFrame: async () => { await hands.send({ image: videoElement }); },
        width: 1280, height: 720, facingMode: 'user'
    });
    camera.start();
}

document.getElementById('hud').classList.remove('hidden');

window.addEventListener('load', () => {
    initAudio();
    initMediaPipe();
    requestAnimationFrame(renderLoop);
});
</script>
</body>
</html>
